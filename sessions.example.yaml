sessions:
  - name: "auth-refactor"
    project_path: "/path/to/your/project"
    goal: "Refactor the authentication module to use JWT tokens. Add unit tests."
    model: "claude-opus-4-6"         # optional, defaults to claude-opus-4-6
    thinking: false                  # enable extended thinking (recommended for complex tasks)
    thinking_budget: 10000           # max thinking tokens; default 10000 when thinking enabled
    tool_permissions:
      auto_approve_reads: true        # read_file, list_directory, grep auto-approved
      auto_approve_bash: false        # bash commands always require approval
      auto_approve_writes: false      # write_file, edit_file always require approval
      auto_approve_web_fetch: false   # web fetch requests always require approval
      auto_approve_http: false        # http tool always requires approval
      auto_approve_file_ops: false    # create_directory, move_file, delete_file always require approval
    max_turns: 50                     # optional safety cap (default: 50)

  - name: "docs-generator"
    project_path: "/path/to/another/project"
    goal: "Generate API documentation for all public Go functions."
    model: "claude-opus-4-6"
    thinking: true                   # use extended thinking for deeper analysis
    thinking_budget: 8000
    tool_permissions:
      auto_approve_reads: true
      auto_approve_bash: false
      auto_approve_writes: true       # allow writes without prompting for this session
      auto_approve_web_fetch: false
      auto_approve_http: false
      auto_approve_file_ops: false
    max_turns: 30

  # Batch sessions: submitted together to the Anthropic Message Batches API.
  # Cost is 50% less than standard API. Trade-offs: single-turn only (no tool
  # loop), results can take up to 24 hours, no interactive permission prompts.
  # All sessions with batch: true are grouped into one batch request.
  - name: "summarise-readme"
    project_path: "/path/to/project"
    goal: "Summarise the README in one paragraph and write it to SUMMARY.md"
    model: "claude-opus-4-6"
    batch: true                      # submit via Anthropic Message Batches API
    tool_permissions:
      auto_approve_reads: true
      auto_approve_writes: true

  - name: "changelog-draft"
    project_path: "/path/to/project"
    goal: "Draft a CHANGELOG entry for the last 10 git commits."
    model: "claude-opus-4-6"
    batch: true
    tool_permissions:
      auto_approve_reads: true
      auto_approve_bash: true
